<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Osobní tracker pleti a doplňků" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Continuity" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Continuity</title>
    <!-- Apply theme + accent from localStorage before React mounts to prevent FOUC -->
    <script>
      (function () {
        var t = localStorage.getItem("app_theme") || "light";
        var a = localStorage.getItem("app_accent") || "lavender";
        var accents = {
          rose: { hex: "#f43f5e", soft: "#ffe4e6", softDark: "#4c0519", tint: "#fff1f2" },
          lavender: { hex: "#a78bfa", soft: "#ede9fe", softDark: "#2e1065", tint: "#f5f3ff" },
          mint: { hex: "#10b981", soft: "#d1fae5", softDark: "#022c22", tint: "#ecfdf5" },
        };
        var p = accents[a] || accents.lavender;
        var dark = t === "dark";
        if (dark) document.documentElement.classList.add("dark");
        var el = document.documentElement;
        el.style.setProperty("--background", dark ? "#0a0a0a" : p.tint);
        el.style.setProperty("--accent", p.hex);
        el.style.setProperty("--accent-soft", dark ? p.softDark : p.soft);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
